[mypy]
python_version = 3.10
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = False
follow_imports = normal

# Optional deps — 의존성 미설치도 OK
[mypy-pykakasi.*]
ignore_missing_imports = True
[mypy-pypinyin.*]
ignore_missing_imports = True
[mypy-hanja.*]
ignore_missing_imports = True
[mypy-epitran.*]
ignore_missing_imports = True
[mypy-g2p_en.*]
ignore_missing_imports = True
[mypy-nltk.*]
ignore_missing_imports = True
[mypy-fastapi.*]
ignore_missing_imports = True
[mypy-pydantic.*]
ignore_missing_imports = True
[mypy-gradio.*]
ignore_missing_imports = True

# Tests / scripts — 덜 strict
[mypy-tests.*]
ignore_errors = True
[mypy-scripts.*]
ignore_errors = True
